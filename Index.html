<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pierre OS</title>
  <script src="dashboard-data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0e0e14;
      --surface:      #13131c;
      --card:         #1a1a26;
      --card-hover:   #1f1f2e;
      --border:       #26263a;
      --border-light: #2e2e45;
      --accent:       #e8a020;
      --accent-dim:   rgba(232,160,32,0.10);
      --accent-glow:  rgba(232,160,32,0.22);
      --text:         #e4e4f0;
      --text-sub:     #8888a8;
      --text-muted:   #50506a;
      --high:         #e05c5c;
      --high-bg:      rgba(224,92,92,0.11);
      --med:          #e8a020;
      --med-bg:       rgba(232,160,32,0.11);
      --low:          #5c9ee0;
      --low-bg:       rgba(92,158,224,0.11);
      --green:        #5cbe8a;
      --green-bg:     rgba(92,190,138,0.11);
      --purple:       #a87fea;
      --purple-bg:    rgba(168,127,234,0.11);
      --teal:         #5abfbf;
      --teal-bg:      rgba(90,191,191,0.11);
      --radius:       12px;
      --radius-sm:    8px;
      --radius-xs:    5px;
      --header-h:     60px;
    }

    html { font-size: 15px; scroll-behavior: smooth; }
    body  { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; line-height: 1.6; min-height: 100vh; }

    /* ── HEADER ───────────────────────────────── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 24px;
      position: sticky; top: 0; z-index: 100;
    }

    .logo {
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .logo-mark {
      width: 32px; height: 32px;
      background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px; color: #0e0e14;
    }
    .logo-text  { font-size: 1rem; font-weight: 700; letter-spacing: -0.3px; }
    .logo-sub   { font-size: 0.7rem; color: var(--text-sub); }

    /* ── TABS ─────────────────────────────────── */
    .tab-nav {
      display: flex; gap: 4px; flex: 1; justify-content: center;
    }
    .tab {
      background: none; border: none; color: var(--text-sub);
      padding: 6px 16px; border-radius: var(--radius-sm);
      font-size: 0.83rem; font-weight: 500; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
      border: 1px solid transparent;
    }
    .tab:hover  { color: var(--text); background: rgba(255,255,255,0.04); }
    .tab.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--accent-glow);
    }

    .header-right {
      display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    }
    .date-display { text-align: right; }
    .date-day     { font-size: 0.83rem; font-weight: 500; color: var(--text); }
    .date-full    { font-size: 0.7rem; color: var(--text-sub); }

    .refresh-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text-sub); padding: 6px 13px;
      border-radius: var(--radius-sm); cursor: pointer;
      font-size: 0.78rem; transition: all 0.15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── VIEWS ────────────────────────────────── */
    .view { display: none; }
    .view.active {
      display: block;
      animation: fadeUp 0.18s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .view-inner {
      max-width: 1360px; margin: 0 auto;
      padding: 26px 28px 60px;
    }

    /* ── DASHBOARD GRID ───────────────────────── */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }
    .full-width { grid-column: 1 / -1; }

    /* ── STATS BAR ────────────────────────────── */
    .stats-bar {
      display: flex; gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 18px;
      display: flex; align-items: center; gap: 12px;
    }
    .stat-icon   { font-size: 1.3rem; }
    .stat-number { font-size: 1.5rem; font-weight: 700; line-height: 1; }
    .stat-label  { font-size: 0.72rem; color: var(--text-sub); margin-top: 2px; }

    /* ── SECTION CARD ─────────────────────────── */
    .section {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
    }
    .section-header {
      padding: 13px 18px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.018);
    }
    .section-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-sub);
    }
    .section-title.accent { color: var(--accent); }
    .count-badge {
      background: var(--accent-dim); color: var(--accent);
      border-radius: 20px; padding: 1px 9px;
      font-size: 0.72rem; font-weight: 600;
    }
    .section-body { padding: 10px; }

    /* ── EXECUTION ITEMS ──────────────────────── */
    .item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); margin-bottom: 7px; overflow: hidden;
      cursor: pointer; transition: border-color 0.15s;
    }
    .item:last-child { margin-bottom: 0; }
    .item:hover { border-color: var(--border-light); }
    .item-main {
      padding: 11px 13px;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .priority-dot {
      width: 7px; height: 7px; border-radius: 50%;
      margin-top: 7px; flex-shrink: 0;
    }
    .priority-dot.High   { background: var(--high); box-shadow: 0 0 5px var(--high); }
    .priority-dot.Medium { background: var(--med);  box-shadow: 0 0 5px var(--med); }
    .priority-dot.Low    { background: var(--low);  box-shadow: 0 0 5px var(--low); }
    .item-content { flex: 1; min-width: 0; }
    .item-title   { font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
    .item-meta    { display: flex; flex-wrap: wrap; gap: 5px; }
    .expand-chevron {
      color: var(--text-muted); font-size: 0.7rem;
      margin-top: 5px; flex-shrink: 0; transition: transform 0.2s;
    }
    .item.open .expand-chevron { transform: rotate(180deg); }

    .item-detail {
      display: none; padding: 0 13px 12px 30px;
      border-top: 1px solid var(--border); padding-top: 11px;
    }
    .item.open .item-detail { display: block; }
    .detail-row { margin-bottom: 7px; }
    .detail-label {
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-sub); margin-bottom: 2px;
    }
    .detail-value { font-size: 0.82rem; color: var(--text); line-height: 1.5; }
    .first-step-box {
      background: var(--accent-dim); border: 1px solid var(--accent-glow);
      border-radius: 6px; padding: 8px 11px; margin-top: 8px;
    }
    .first-step-label { font-size: 0.67rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .first-step-text  { font-size: 0.82rem; color: var(--text); }

    /* ── TAGS / BADGES ────────────────────────── */
    .tag {
      display: inline-block; font-size: 0.68rem; font-weight: 500;
      padding: 2px 8px; border-radius: 20px;
    }
    .tag-type    { background: var(--purple-bg); color: var(--purple); }
    .tag-project { background: var(--teal-bg);   color: var(--teal); }
    .tag-status-Active    { background: var(--green-bg); color: var(--green); }
    .tag-status-Planned   { background: rgba(140,140,180,0.12); color: #9898c0; }
    .tag-status-Scheduled { background: var(--teal-bg); color: var(--teal); }
    .tag-status-Parked    { background: rgba(100,100,140,0.10); color: var(--text-muted); }
    .tag-status-Completed { background: var(--green-bg); color: var(--green); }
    .tag-pri-High   { background: var(--high-bg);  color: var(--high); }
    .tag-pri-Medium { background: var(--med-bg);   color: var(--med); }
    .tag-pri-Low    { background: var(--low-bg);   color: var(--low); }
    .tag-val-High   { background: var(--high-bg);  color: var(--high); }
    .tag-val-Medium { background: var(--med-bg);   color: var(--med); }
    .tag-val-Low    { background: var(--low-bg);   color: var(--low); }

    /* ── EMPTY STATE ──────────────────────────── */
    .empty {
      padding: 22px; text-align: center;
      color: var(--text-muted); font-size: 0.83rem;
    }

    /* ── IDEAS VIEW ───────────────────────────── */
    .ideas-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 12px;
    }
    .view-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.3px; }
    .view-count { font-size: 0.8rem; color: var(--text-sub); margin-top: 1px; }

    .filter-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
      margin-bottom: 18px;
    }
    .filter-search {
      flex: 1; min-width: 180px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 12px;
      color: var(--text); font-size: 0.83rem; outline: none;
      transition: border-color 0.15s;
    }
    .filter-search::placeholder { color: var(--text-muted); }
    .filter-search:focus { border-color: var(--accent); }
    .filter-select {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 10px;
      color: var(--text); font-size: 0.8rem; outline: none; cursor: pointer;
      transition: border-color 0.15s;
    }
    .filter-select:focus { border-color: var(--accent); }
    .filter-clear {
      background: none; border: none; color: var(--text-muted);
      font-size: 0.78rem; cursor: pointer; padding: 6px 8px;
      border-radius: var(--radius-xs); transition: color 0.15s;
    }
    .filter-clear:hover { color: var(--text); }
    .filter-count { font-size: 0.75rem; color: var(--text-sub); margin-left: auto; }

    /* ── IDEA CARD ────────────────────────────── */
    .idea-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
      cursor: pointer; transition: border-color 0.15s;
    }
    .idea-card:hover { border-color: var(--border-light); }
    .idea-card.open  { border-color: var(--accent-glow); }

    .idea-card-head {
      padding: 14px 18px;
      display: flex; align-items: flex-start; gap: 14px;
    }
    .idea-card-main { flex: 1; min-width: 0; }
    .idea-title {
      font-size: 0.95rem; font-weight: 600;
      margin-bottom: 6px; color: var(--text);
    }
    .idea-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
    .idea-date { font-size: 0.7rem; color: var(--text-muted); margin-left: 4px; }

    .idea-body {
      display: none;
      padding: 0 18px 16px;
      border-top: 1px solid var(--border);
    }
    .idea-body.open { display: block; padding-top: 16px; }

    .idea-section { margin-bottom: 14px; }
    .idea-section:last-child { margin-bottom: 0; }
    .idea-section-label {
      font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-sub); margin-bottom: 5px;
    }
    .idea-section-text { font-size: 0.85rem; color: var(--text); line-height: 1.6; }

    .origin-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    }
    .origin-block {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
    }
    .origin-block-label {
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 4px;
    }
    .origin-block-text { font-size: 0.8rem; color: var(--text); line-height: 1.5; }

    .connection-list { list-style: none; }
    .connection-list li {
      font-size: 0.83rem; color: var(--text); line-height: 1.55;
      padding: 5px 0; border-bottom: 1px solid var(--border);
      padding-left: 14px; position: relative;
    }
    .connection-list li::before {
      content: '→'; position: absolute; left: 0;
      color: var(--accent); font-size: 0.75rem;
    }
    .connection-list li:last-child { border-bottom: none; }

    .next-action-box {
      background: var(--accent-dim); border: 1px solid var(--accent-glow);
      border-radius: var(--radius-sm); padding: 10px 14px;
    }
    .next-action-label { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 3px; }
    .next-action-text  { font-size: 0.83rem; color: var(--text); }

    .no-ideas { padding: 40px 20px; text-align: center; color: var(--text-muted); }
    .no-ideas-icon { font-size: 2rem; margin-bottom: 10px; }

    /* ── PROJECTS VIEW ────────────────────────── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .project-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      transition: border-color 0.15s;
    }
    .project-card:hover { border-color: var(--border-light); }
    .project-card.status-Parked { opacity: 0.7; }

    .project-card-head {
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 10px;
    }
    .project-emoji-name { display: flex; align-items: center; gap: 10px; }
    .project-emoji {
      font-size: 1.5rem; width: 40px; height: 40px;
      background: var(--surface); border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .project-name { font-size: 0.95rem; font-weight: 700; line-height: 1.3; }
    .project-updated { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }

    .project-description {
      font-size: 0.82rem; color: var(--text-sub); line-height: 1.55;
    }
    .project-focus-row { }
    .project-focus-label {
      font-size: 0.67rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px;
    }
    .project-focus-text { font-size: 0.82rem; color: var(--text); line-height: 1.5; }

    .project-meta {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
    }
    .project-ideas-count {
      font-size: 0.72rem; color: var(--text-sub);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 9px;
    }
    .project-ideas-count span { color: var(--accent); font-weight: 600; }

    .project-next {
      background: var(--accent-dim); border: 1px solid var(--accent-glow);
      border-radius: var(--radius-sm); padding: 9px 12px;
    }
    .project-next-label { font-size: 0.67rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 2px; }
    .project-next-text  { font-size: 0.8rem; color: var(--text); line-height: 1.5; }

    .project-notes { font-size: 0.78rem; color: var(--text-muted); font-style: italic; }

    /* ── QUEUE VIEW ───────────────────────────── */
    .queue-groups { display: flex; flex-direction: column; gap: 14px; }

    .queue-group { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .queue-group-head {
      padding: 13px 18px; display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; transition: background 0.15s;
    }
    .queue-group-head:hover { background: rgba(255,255,255,0.02); }
    .queue-group-label {
      display: flex; align-items: center; gap: 9px;
      font-size: 0.8rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-sub);
    }
    .queue-group-right { display: flex; align-items: center; gap: 10px; }
    .queue-chevron { color: var(--text-muted); font-size: 0.72rem; transition: transform 0.2s; }
    .queue-group.open .queue-chevron { transform: rotate(180deg); }
    .queue-group-body { display: none; padding: 10px; border-top: 1px solid var(--border); }
    .queue-group.open .queue-group-body { display: block; }

    /* ── REVIEWS VIEW ─────────────────────────── */
    .reviews-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .review-placeholder {
      background: var(--card); border: 1px solid var(--border);
      border: 1px dashed var(--border-light);
      border-radius: var(--radius); padding: 32px 24px;
      text-align: center;
    }
    .review-placeholder-icon  { font-size: 2rem; margin-bottom: 10px; }
    .review-placeholder-title { font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; }
    .review-placeholder-text  { font-size: 0.82rem; color: var(--text-sub); line-height: 1.6; }

    /* ── RESPONSIVE ───────────────────────────── */
    @media (max-width: 1100px) {
      .projects-grid { grid-template-columns: 1fr 1fr; }
      .origin-grid   { grid-template-columns: 1fr; }
    }
    @media (max-width: 800px) {
      header { padding: 0 16px; gap: 12px; }
      .logo-sub { display: none; }
      .tab { padding: 5px 11px; font-size: 0.78rem; }
      .view-inner { padding: 16px 14px 40px; }
      .dash-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-wrap: wrap; }
      .stat-card { min-width: calc(50% - 6px); }
      .projects-grid { grid-template-columns: 1fr; }
      .reviews-grid  { grid-template-columns: 1fr; }
      .date-display  { display: none; }
    }
    @media (max-width: 560px) {
      .tab-nav { gap: 2px; }
      .tab { padding: 5px 8px; font-size: 0.74rem; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────── -->
<header>
  <div class="logo">
    <div class="logo-mark">P</div>
    <div>
      <div class="logo-text">Pierre OS</div>
      <div class="logo-sub">Builder Dashboard</div>
    </div>
  </div>

  <nav class="tab-nav">
    <button class="tab active" data-view="dashboard">Dashboard</button>
    <button class="tab"        data-view="ideas">Ideas</button>
    <button class="tab"        data-view="projects">Projects</button>
    <button class="tab"        data-view="queue">Execution Queue</button>
    <button class="tab"        data-view="reviews">Reviews</button>
  </nav>

  <div class="header-right">
    <div class="date-display">
      <div class="date-day"  id="hDay"></div>
      <div class="date-full" id="hDate"></div>
    </div>
    <button class="refresh-btn" onclick="location.reload()">↺ Refresh</button>
  </div>
</header>

<!-- ── VIEWS ───────────────────────────────────── -->
<div id="view-dashboard" class="view active">
  <div class="view-inner" id="dash-root"></div>
</div>

<div id="view-ideas" class="view">
  <div class="view-inner" id="ideas-root"></div>
</div>

<div id="view-projects" class="view">
  <div class="view-inner" id="projects-root"></div>
</div>

<div id="view-queue" class="view">
  <div class="view-inner" id="queue-root"></div>
</div>

<div id="view-reviews" class="view">
  <div class="view-inner" id="reviews-root"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
const ideasFilter = { search: '', status: 'all', value: 'all', project: 'all' };

// ─────────────────────────────────────────────────────────────
// DATE
// ─────────────────────────────────────────────────────────────
(function() {
  const n = new Date();
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('hDay').textContent  = days[n.getDay()];
  document.getElementById('hDate').textContent = `${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
})();

// ─────────────────────────────────────────────────────────────
// TAB NAVIGATION
// ─────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('view-' + btn.dataset.view).classList.add('active');
  });
});

// ─────────────────────────────────────────────────────────────
// TOGGLE HELPERS
// ─────────────────────────────────────────────────────────────
function toggleEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
}

// ─────────────────────────────────────────────────────────────
// TAG BUILDER
// ─────────────────────────────────────────────────────────────
function tag(cls, text) {
  return `<span class="tag ${cls}">${text}</span>`;
}

function itemTags(item) {
  const t = [];
  if (item.type)     t.push(tag('tag-type',    item.type));
  if (item.relatedProject) t.push(tag('tag-project', item.relatedProject));
  if (item.status)   t.push(tag('tag-status-' + item.status, item.status));
  if (item.priority) t.push(tag('tag-pri-'    + item.priority, item.priority));
  return t.join('');
}

// ─────────────────────────────────────────────────────────────
// EXECUTION ITEM
// ─────────────────────────────────────────────────────────────
function renderItem(item, isCompleted) {
  const id = 'itm-' + Math.random().toString(36).slice(2);
  const details = [];
  if (item.objective)  details.push(`<div class="detail-row"><div class="detail-label">Objective</div><div class="detail-value">${item.objective}</div></div>`);
  if (item.notes)      details.push(`<div class="detail-row"><div class="detail-label">Notes</div><div class="detail-value">${item.notes}</div></div>`);
  if (item.date)       details.push(`<div class="detail-row"><div class="detail-label">Date</div><div class="detail-value">${item.date}</div></div>`);
  const firstStep = item.firstStep
    ? `<div class="first-step-box"><div class="first-step-label">▶ First Step</div><div class="first-step-text">${item.firstStep}</div></div>` : '';
  const dotCls = item.priority || 'Low';
  const dimTitle = isCompleted ? `style="color:var(--text-sub)"` : '';

  return `
    <div class="item" id="${id}" onclick="document.getElementById('${id}').classList.toggle('open')">
      <div class="item-main">
        <span class="priority-dot ${dotCls}"></span>
        <div class="item-content">
          <div class="item-title" ${dimTitle}>${item.title}</div>
          <div class="item-meta">${itemTags(item)}</div>
        </div>
        <span class="expand-chevron">▾</span>
      </div>
      <div class="item-detail">
        ${details.join('')}
        ${firstStep}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// SECTION BLOCK
// ─────────────────────────────────────────────────────────────
function section(title, icon, items, opts = {}) {
  const body = items.length
    ? items.map(i => renderItem(i, opts.completed)).join('')
    : `<div class="empty">Nothing here yet</div>`;
  const titleCls = opts.accent ? 'section-title accent' : 'section-title';
  const badge = items.length ? `<span class="count-badge">${items.length}</span>` : '';
  return `
    <div class="section ${opts.fullWidth ? 'full-width' : ''}">
      <div class="section-header">
        <div class="${titleCls}"><span>${icon}</span>${title}</div>
        ${badge}
      </div>
      <div class="section-body">${body}</div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// ── DASHBOARD VIEW
// ─────────────────────────────────────────────────────────────
function renderDashboard(d) {
  const stats = [
    { icon: '⚡', n: d.activeExplorations.length, label: 'Active Explorations' },
    { icon: '📅', n: d.thisWeek.length,            label: 'This Week' },
    { icon: '📦', n: d.backlog.length,              label: 'In Backlog' },
    { icon: '✅', n: d.completedRecently.length,    label: 'Completed' },
  ];
  const statsHtml = `<div class="stats-bar">${stats.map(s => `
    <div class="stat-card">
      <div class="stat-icon">${s.icon}</div>
      <div><div class="stat-number">${s.n}</div><div class="stat-label">${s.label}</div></div>
    </div>`).join('')}</div>`;

  const grid = `<div class="dash-grid">
    <div class="full-width">${section('Today', '☀️', d.today, { accent: true })}</div>
    ${section('This Week', '📅', d.thisWeek)}
    ${section('Active Explorations', '⚡', d.activeExplorations)}
    ${section('Idea Backlog', '💡', d.backlog)}
    ${section('Project Focus', '🎯', d.projectFocus)}
    <div class="full-width">${section('Completed Recently', '✅', d.completedRecently, { completed: true })}</div>
    ${section('Parked for Later', '🅿️', d.parked)}
  </div>`;

  document.getElementById('dash-root').innerHTML = statsHtml + grid;
}

// ─────────────────────────────────────────────────────────────
// ── IDEAS VIEW
// ─────────────────────────────────────────────────────────────
function getUniqueProjects(ideas) {
  const set = new Set();
  ideas.forEach(i => (i.relatedProjects || []).forEach(p => set.add(p)));
  return [...set].sort();
}

function getUniqueStatuses(ideas) {
  return [...new Set(ideas.map(i => i.status))].sort();
}

function renderIdeaCard(idea) {
  const id = 'idea-' + idea.id;
  const projs = (idea.relatedProjects || []).map(p => tag('tag-project', p)).join('');
  const valTag  = tag('tag-val-' + idea.potentialValue, idea.potentialValue);
  const statTag = tag('tag-status-' + idea.status, idea.status);
  const typeTag = tag('tag-type', idea.type);

  const originHtml = idea.originStory ? `
    <div class="idea-section">
      <div class="idea-section-label">Origin Story</div>
      <div class="origin-grid">
        <div class="origin-block">
          <div class="origin-block-label">Why it occurred</div>
          <div class="origin-block-text">${idea.originStory.why || '—'}</div>
        </div>
        <div class="origin-block">
          <div class="origin-block-label">Problem triggered</div>
          <div class="origin-block-text">${idea.originStory.problem || '—'}</div>
        </div>
        <div class="origin-block">
          <div class="origin-block-label">Conversation</div>
          <div class="origin-block-text">${idea.originStory.conversation || '—'}</div>
        </div>
      </div>
    </div>` : '';

  const connectionsHtml = (idea.ideaConnections || []).length ? `
    <div class="idea-section">
      <div class="idea-section-label">Idea Connections</div>
      <ul class="connection-list">
        ${idea.ideaConnections.map(c => `<li>${c}</li>`).join('')}
      </ul>
    </div>` : '';

  return `
    <div class="idea-card"
         id="${id}"
         data-status="${idea.status}"
         data-value="${idea.potentialValue}"
         data-projects="${(idea.relatedProjects||[]).join(',')}"
         data-title="${idea.title.toLowerCase()}"
         data-summary="${(idea.summary||'').toLowerCase()}"
         onclick="toggleIdeaCard('${id}')">
      <div class="idea-card-head">
        <div class="idea-card-main">
          <div class="idea-title">${idea.title}</div>
          <div class="idea-meta">
            ${typeTag}${projs}${statTag}${valTag}
            <span class="idea-date">${idea.date}</span>
          </div>
        </div>
        <span class="expand-chevron">▾</span>
      </div>
      <div class="idea-body" id="${id}-body">
        <div class="idea-section">
          <div class="idea-section-label">Summary</div>
          <div class="idea-section-text">${idea.summary || '—'}</div>
        </div>
        <div class="next-action-box" style="margin-bottom:14px">
          <div class="next-action-label">▶ Next Action</div>
          <div class="next-action-text">${idea.nextAction || '—'}</div>
        </div>
        ${originHtml}
        ${connectionsHtml}
      </div>
    </div>`;
}

function toggleIdeaCard(id) {
  const card = document.getElementById(id);
  const body = document.getElementById(id + '-body');
  if (!card || !body) return;
  card.classList.toggle('open');
  body.classList.toggle('open');
  // Update chevron
  const chev = card.querySelector('.expand-chevron');
  if (chev) chev.style.transform = card.classList.contains('open') ? 'rotate(180deg)' : '';
}

function applyIdeasFilter() {
  const cards = document.querySelectorAll('.idea-card');
  let visible = 0;
  cards.forEach(card => {
    const matchSearch = !ideasFilter.search ||
      card.dataset.title.includes(ideasFilter.search.toLowerCase()) ||
      card.dataset.summary.includes(ideasFilter.search.toLowerCase());
    const matchStatus  = ideasFilter.status  === 'all' || card.dataset.status  === ideasFilter.status;
    const matchValue   = ideasFilter.value   === 'all' || card.dataset.value   === ideasFilter.value;
    const matchProject = ideasFilter.project === 'all' || card.dataset.projects.includes(ideasFilter.project);
    const show = matchSearch && matchStatus && matchValue && matchProject;
    card.style.display = show ? '' : 'none';
    if (show) visible++;
  });
  const fc = document.getElementById('filter-count');
  if (fc) fc.textContent = `${visible} idea${visible !== 1 ? 's' : ''}`;
}

function renderIdeas(ideas) {
  const statuses = getUniqueStatuses(ideas);
  const projects = getUniqueProjects(ideas);

  const filterBar = `
    <div class="filter-bar">
      <input id="idea-search" class="filter-search" type="text" placeholder="Search ideas…"
             oninput="ideasFilter.search=this.value;applyIdeasFilter()">
      <select id="idea-filter-status" class="filter-select"
              onchange="ideasFilter.status=this.value;applyIdeasFilter()">
        <option value="all">All statuses</option>
        ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
      </select>
      <select id="idea-filter-value" class="filter-select"
              onchange="ideasFilter.value=this.value;applyIdeasFilter()">
        <option value="all">All values</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <select id="idea-filter-project" class="filter-select"
              onchange="ideasFilter.project=this.value;applyIdeasFilter()">
        <option value="all">All projects</option>
        ${projects.map(p => `<option value="${p}">${p}</option>`).join('')}
      </select>
      <button class="filter-clear" onclick="clearIdeasFilter()">✕ Clear</button>
      <span class="filter-count" id="filter-count">${ideas.length} ideas</span>
    </div>`;

  const cards = ideas.length
    ? ideas.map(renderIdeaCard).join('')
    : `<div class="no-ideas"><div class="no-ideas-icon">💡</div><div>No ideas yet</div></div>`;

  document.getElementById('ideas-root').innerHTML = `
    <div class="ideas-header">
      <div><div class="view-title">Ideas Library</div>
      <div class="view-count">${ideas.length} total ideas</div></div>
    </div>
    ${filterBar}
    <div id="ideas-list">${cards}</div>`;
}

function clearIdeasFilter() {
  ideasFilter.search = '';
  ideasFilter.status = 'all';
  ideasFilter.value  = 'all';
  ideasFilter.project = 'all';
  document.getElementById('idea-search').value = '';
  document.getElementById('idea-filter-status').value  = 'all';
  document.getElementById('idea-filter-value').value   = 'all';
  document.getElementById('idea-filter-project').value = 'all';
  applyIdeasFilter();
}

// ─────────────────────────────────────────────────────────────
// ── PROJECTS VIEW
// ─────────────────────────────────────────────────────────────
function countRelatedIdeas(project, ideas) {
  return (ideas || []).filter(i =>
    (i.relatedProjects || []).some(p =>
      p.toLowerCase().includes(project.name.toLowerCase().split(' ')[0])
    )
  ).length;
}

function renderProjectCard(p, ideas) {
  const related = countRelatedIdeas(p, ideas);
  const statusTag = tag('tag-status-' + p.status, p.status);
  const notesHtml = p.notes
    ? `<div class="project-notes">${p.notes}</div>` : '';
  return `
    <div class="project-card status-${p.status}">
      <div class="project-card-head">
        <div class="project-emoji-name">
          <div class="project-emoji">${p.emoji || '📁'}</div>
          <div>
            <div class="project-name">${p.name}</div>
            <div class="project-updated">Updated ${p.lastUpdated}</div>
          </div>
        </div>
        ${statusTag}
      </div>
      <div class="project-description">${p.description}</div>
      <div class="project-focus-row">
        <div class="project-focus-label">Current Focus</div>
        <div class="project-focus-text">${p.currentFocus}</div>
      </div>
      <div class="project-meta">
        <span class="project-ideas-count"><span>${related}</span> related idea${related !== 1 ? 's' : ''}</span>
      </div>
      <div class="project-next">
        <div class="project-next-label">▶ Next Action</div>
        <div class="project-next-text">${p.nextAction}</div>
      </div>
      ${notesHtml}
    </div>`;
}

function renderProjects(projects, ideas) {
  const cards = projects.map(p => renderProjectCard(p, ideas)).join('');
  document.getElementById('projects-root').innerHTML = `
    <div class="ideas-header" style="margin-bottom:20px">
      <div><div class="view-title">Projects</div>
      <div class="view-count">${projects.length} projects</div></div>
    </div>
    <div class="projects-grid">${cards}</div>`;
}

// ─────────────────────────────────────────────────────────────
// ── QUEUE VIEW
// ─────────────────────────────────────────────────────────────
function queueGroup(id, icon, label, items, openByDefault) {
  const gid = 'qg-' + id;
  const body = items.length
    ? items.map(i => renderItem(i, id === 'completed')).join('')
    : `<div class="empty">Nothing here</div>`;
  const badge = items.length ? `<span class="count-badge">${items.length}</span>` : '';
  const openCls = openByDefault ? ' open' : '';
  return `
    <div class="queue-group${openCls}" id="${gid}">
      <div class="queue-group-head" onclick="document.getElementById('${gid}').classList.toggle('open')">
        <div class="queue-group-label"><span>${icon}</span>${label}</div>
        <div class="queue-group-right">${badge}<span class="queue-chevron">▾</span></div>
      </div>
      <div class="queue-group-body">${body}</div>
    </div>`;
}

function renderQueue(d) {
  document.getElementById('queue-root').innerHTML = `
    <div class="ideas-header" style="margin-bottom:20px">
      <div><div class="view-title">Execution Queue</div>
      <div class="view-count">All scheduled and tracked items</div></div>
    </div>
    <div class="queue-groups">
      ${queueGroup('today',       '☀️',  'Today',              d.today,              true)}
      ${queueGroup('thisweek',    '📅',  'This Week',          d.thisWeek,           true)}
      ${queueGroup('active',      '⚡',  'Active Explorations', d.activeExplorations, true)}
      ${queueGroup('backlog',     '💡',  'Backlog',            d.backlog,            false)}
      ${queueGroup('parked',      '🅿️',  'Parked for Later',   d.parked,             false)}
      ${queueGroup('completed',   '✅',  'Completed',          d.completedRecently,  false)}
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// ── REVIEWS VIEW
// ─────────────────────────────────────────────────────────────
function renderReviews(reviews) {
  const hasWeekly   = reviews.weekly  && reviews.weekly.length;
  const hasMonthly  = reviews.monthly && reviews.monthly.length;
  const hasArchive  = reviews.archive && reviews.archive.length;

  const weeklyHtml = hasWeekly
    ? reviews.weekly.map(r => `<div class="item">${r.title}</div>`).join('')
    : `<div class="review-placeholder">
        <div class="review-placeholder-icon">📋</div>
        <div class="review-placeholder-title">No weekly reviews yet</div>
        <div class="review-placeholder-text">Weekly reviews will appear here as they're completed. Use the template in <code>05 Weekly Reviews</code> and dictate your review to Pierre OS.</div>
       </div>`;

  const monthlyHtml = hasMonthly
    ? reviews.monthly.map(r => `<div class="item">${r.title}</div>`).join('')
    : `<div class="review-placeholder">
        <div class="review-placeholder-icon">📆</div>
        <div class="review-placeholder-title">No monthly reviews yet</div>
        <div class="review-placeholder-text">Monthly reviews appear here at the end of each month. Use the template in <code>06 Monthly Reviews</code>.</div>
       </div>`;

  const archiveHtml = hasArchive
    ? reviews.archive.map(r => `<div class="item">${r.title}</div>`).join('')
    : `<div class="review-placeholder">
        <div class="review-placeholder-icon">🗃️</div>
        <div class="review-placeholder-title">Archive is empty</div>
        <div class="review-placeholder-text">Completed projects, old ideas, and archived work will live here.</div>
       </div>`;

  document.getElementById('reviews-root').innerHTML = `
    <div class="ideas-header" style="margin-bottom:20px">
      <div><div class="view-title">Reviews & Archive</div>
      <div class="view-count">Reflections, retrospectives, and archived work</div></div>
    </div>
    <div class="reviews-grid">
      <div>
        <div class="section-title" style="margin-bottom:12px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-sub)">
          📋 &nbsp;Weekly Reviews
        </div>
        ${weeklyHtml}
      </div>
      <div>
        <div class="section-title" style="margin-bottom:12px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-sub)">
          📆 &nbsp;Monthly Reviews
        </div>
        ${monthlyHtml}
      </div>
      <div class="full-width" style="grid-column:1/-1">
        <div class="section-title" style="margin-bottom:12px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--text-sub)">
          🗃️ &nbsp;Archive
        </div>
        ${archiveHtml}
      </div>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
(function init() {
  if (typeof PierreOSData === 'undefined') {
    document.getElementById('dash-root').innerHTML =
      `<div style="padding:60px;text-align:center;color:var(--high)">
        ⚠️ Could not load dashboard-data.js<br>
        <span style="font-size:0.83rem;color:var(--text-sub);margin-top:8px;display:block">
          Make sure both files are in the same folder and open the HTML file from your local file system.
        </span>
       </div>`;
    return;
  }

  // Support both old flat format and new nested format
  const d = PierreOSData.dashboard || PierreOSData;
  const ideas    = PierreOSData.ideas    || [];
  const projects = PierreOSData.projects || [];
  const reviews  = PierreOSData.reviews  || { weekly: [], monthly: [], archive: [] };

  renderDashboard(d);
  renderIdeas(ideas);
  renderProjects(projects, ideas);
  renderQueue(d);
  renderReviews(reviews);
})();
</script>
</body>
</html>
